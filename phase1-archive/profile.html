<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creativo — Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/posts.css">
    <link rel="icon" href="assets/images/creativo_icon.png" type="image/png">
</head>
<body data-page="profile">

    <!-- NAVBAR — same structure as feed.html -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-inner">

            <a href="feed.html" class="navbar-brand" aria-label="Creativo home">
                <img src="assets/images/creativo_icon.png" alt="Creativo icon" class="brand-icon">
                <img src="assets/images/creativo_name.svg" alt="Creativo" class="brand-name">
            </a>

            <div class="navbar-actions">
                <a href="#" id="navbar-ProfileLink" class="nav-profile-btn" aria-label="My profile">
                    <span id="navbar-avatar" aria-hidden="true"></span>
                    <span class="navbar-username" id="navbar-username"></span>
                </a>
                <button class="btn-logout" id="logoutBtn" aria-label="Log out">
                    <img src="assets/images/logout_icon.svg" class="logout-svg" aria-hidden="true">
                </button>
            </div>

        </div>
    </nav>

    <!-- PAGE CONTAINER -->
    <div class="app-container">

        <!-- PROFILE LAYOUT: sidebar | posts -->
        <div class="profile-layout">

            <!-- LEFT SIDEBAR — profile card -->
            <aside class="profile-sidebar">
                <div class="profile-card">

                    <!-- Avatar -->
                    <div class="profile-avatar-wrapper">
                        <div id="profileAvatar"></div>
                        <button class="edit-avatar-btn" id="editAvatarBtn" aria-label="Edit profile picture">
                            📷
                        </button>
                    </div>

                    <!-- Name, handle, bio -->
                    <div class="profile-info">
                        <h1 class="profile-name" id="profileName">Loading…</h1>
                        <p class="profile-handle" id="profileHandle">@username</p>

                        <div class="profile-bio-section">
                            <p class="profile-bio" id="profileBio">No bio yet.</p>
                            <button class="edit-bio-btn" id="editBioBtn">✎ Edit bio</button>
                        </div>

                        <!-- Stats -->
                        <div class="profile-stats">
                            <div class="stat-item">
                                <span class="stat-number" id="postCount">0</span>
                                <span class="stat-label">posts</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-number" id="followerCount">0</span>
                                <span class="stat-label">followers</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-number" id="followingCount">0</span>
                                <span class="stat-label">following</span>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="profile-actions">
                            <!-- Own profile: edit button -->
                            <button class="btn btn-primary" id="editProfileBtn" style="display:none;">
                                Edit Profile
                            </button>
                            <!-- Other profile: follow button -->
                            <button class="btn btn-follow" id="followBtn" style="display:none;">
                                Follow
                            </button>
                        </div>

                        <p class="join-date" id="joinDate"></p>
                    </div>

                </div>
            </aside>

            <!-- MAIN CONTENT — user posts -->
            <main class="profile-posts">
                <div class="posts-header">
                    <h2 id="postsHeading">✨ My Creations</h2>
                </div>

                <div class="posts-list" id="postsList">
                    <!-- Rendered by profile.js -->
                </div>
            </main>

        </div>
    </div>


    <!-- EDIT PROFILE MODAL -->
    <div class="modal" id="editProfileModal" role="dialog" aria-modal="true" aria-labelledby="editProfileTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="editProfileTitle">Edit Profile</h3>
                <button class="modal-close" id="closeModalBtn" aria-label="Close">&times;</button>
            </div>
            <form id="editProfileForm" novalidate>
                <div class="form-group">
                    <label for="editUsername">Username</label>
                    <input type="text" id="editUsername" placeholder="e.g. creativo_mind" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="editBio">Bio</label>
                    <textarea id="editBio" rows="3" placeholder="Tell us about yourself…"></textarea>
                </div>
                <div class="form-group">
                    <label for="editAvatarUrl">Profile Picture URL</label>
                    <input type="url" id="editAvatarUrl" placeholder="https://example.com/photo.jpg">
                    <small>Leave empty to keep your current avatar.</small>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- storage.js must load first — it defines Storage, Auth, Users, Posts, UI -->
    <script src="js/storage.js"></script>
    <script src="js/profile.js"></script>

</body>
</html>
