<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creativo Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="page">

        <!-- LEFT PANEL — decorative / branding -->
        <div class="left-panel">
            <div class="left-inner-circle"></div>

            <!-- Brand logo -->
            <div class="brand">
                <a href="index.html" class="brand-logo">
     <img src="assets/images/creativo_icon.png" alt="Icon" class="brand-icon-img">
                <img src="assets/images/creativo_logo.png" alt="Logo" class="brand-wordmark">

</a>
            </div>

            <!-- Featured quote -->
            <div class="left-quote">
                <span class="quote-mark">"</span>
                <p class="quote-text">Fill your paper with the breathings of your heart.</p>
                <p class="quote-author">— William Wordsworth</p>
            </div>

            <!-- Category tags -->
            <div class="left-tags">
                <span class="left-tag">poetry</span>
                <span class="left-tag">storytelling</span>
                <span class="left-tag">inspiration</span>
                <span class="left-tag">prompts</span>
                <span class="left-tag">reflection</span>
            </div>
        </div>

        <!-- RIGHT PANEL: register for -->
        <div class="right-panel">
            <div class="form-wrap">

                <h2 class="form-heading">Join Creativo</h2>
                <p class="form-sub">
                    Already have an account? <a href="index.html">Sign in</a>
                </p>

                <!-- Alert messages -->
                <div class="alert alert-error" id="reg-error"></div>
                <div class="alert alert-success" id="reg-success"></div>

                <form id="register-form" novalidate>

                    <div class="field">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" placeholder="e.g. creativo_mind" autocomplete="username">
                        <p class="field-hint">This is how others will see you.</p>
                    </div>

                    <div class="field">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" placeholder="Name1234@email.com" autocomplete="email">
                    </div>

                    <div class="field">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
                        <!-- Password strength indicator -->
                        <div class="strength-bar">
                            <div class="strength-segment" id="s1"></div>
                            <div class="strength-segment" id="s2"></div>
                            <div class="strength-segment" id="s3"></div>
                            <div class="strength-segment" id="s4"></div>
                        </div>
                        <p class="strength-label" id="strength-label">Min. 6 characters</p>
                    </div>

                    <div class="field">
                        <label for="reg-confirm">Confirm Password</label>
                        <input type="password" id="reg-confirm" placeholder="••••••••" autocomplete="new-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Create my account</button>

                </form>

                <p class="form-footer">
                    By joining you agree to our Terms of Service and Privacy Policy.
                </p>

            </div>
        </div>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
