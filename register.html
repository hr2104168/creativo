<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creativo — Register</title>
</head>
<body>

  <div class="page">

    <!-- Left side -->
    <div class="left-panel">
      <h1>creativo</h1>
      <p>where creativity finds its voice</p>
    </div>

    <!-- Right side: register form -->
    <div class="right-panel">

      <h2>Join Creativo</h2>
      <p>Already have an account? <a href="index.html">Sign in</a></p>

      <form id="register-form">

        <div class="field">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="e.g. luna.m" />
        </div>

        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@email.com" />
        </div>

        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="password" />
        </div>

        <div class="field">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="confirm password" />
        </div>

        <button type="submit">Create account</button>

      </form>

    </div>

  </div>

</body>
</html>
